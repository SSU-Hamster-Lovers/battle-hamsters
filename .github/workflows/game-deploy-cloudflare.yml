name: Game Deploy (Cloudflare Pages)

on:
  push:
    branches: [main]
    paths:
      - 'apps/game/**'
      - 'packages/shared/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - '.github/workflows/game-deploy-cloudflare.yml'
  workflow_dispatch:

concurrency:
  group: game-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy game client to Cloudflare Pages
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      # Game Client 는 shared 패키지에 의존하므로 워크스페이스 루트에서 설치
      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build game client
        env:
          VITE_SERVER_WS_URL: ${{ vars.VITE_SERVER_WS_URL }}
        run: pnpm build
        working-directory: apps/game

      - name: Install Wrangler CLI
        run: npm install -g wrangler@3.90.0

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PAGES_PROJECT_NAME: ${{ vars.GAME_CLOUDFLARE_PAGES_PROJECT_NAME }}
        run: |
          wrangler pages deploy apps/game/dist \
            --project-name="${CLOUDFLARE_PAGES_PROJECT_NAME}" \
            --branch=main
