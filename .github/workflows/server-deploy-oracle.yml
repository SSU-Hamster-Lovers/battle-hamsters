name: Server Deploy (Oracle Cloud)

on:
  push:
    branches: [main]
    paths:
      - 'server/**'
      - 'deploy/oracle/**'
      - '.github/workflows/server-deploy-oracle.yml'
  workflow_dispatch:

concurrency:
  group: server-deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Oracle Cloud
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    env:
      OCI_HOST: ${{ vars.OCI_HOST }}
      OCI_USER: ${{ vars.OCI_USER }}
      OCI_SSH_PORT: ${{ vars.OCI_SSH_PORT || '22' }}
      OCI_DEPLOY_PATH: ${{ vars.OCI_DEPLOY_PATH || '/opt/battle-hamsters' }}
      API_PORT: ${{ vars.API_PORT || '8081' }}
      RUST_LOG: ${{ vars.RUST_LOG || 'info' }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Bundle shared data into server context
        # include_str!("../../packages/shared/...") 가 빌드 시 server/ 내부 경로를 기대하므로
        # server/packages/shared 로 복사해 Docker 컨텍스트에 포함시킨다
        run: |
          mkdir -p server/packages
          cp -r packages/shared server/packages/shared

      - name: Create release archive
        run: tar -czf release.tar.gz server deploy/oracle

      - name: Create production environment file
        run: |
          cat > oracle.env <<EOF
          POSTGRES_DB=${POSTGRES_DB}
          POSTGRES_USER=${POSTGRES_USER}
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          DATABASE_URL=${DATABASE_URL}
          API_PORT=${API_PORT}
          RUST_LOG=${RUST_LOG}
          EOF

      - name: Configure SSH
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${OCI_SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${OCI_SSH_PORT}" "${OCI_HOST}" >> ~/.ssh/known_hosts

      - name: Upload release bundle
        run: |
          scp -P "${OCI_SSH_PORT}" release.tar.gz oracle.env "${OCI_USER}@${OCI_HOST}:/tmp/"

      - name: Validate deploy configuration
        run: |
          test -n "${OCI_HOST}"
          test -n "${OCI_USER}"
          test -n "${OCI_DEPLOY_PATH}"

      - name: Deploy on Oracle Cloud instance
        run: |
          ssh -p "${OCI_SSH_PORT}" "${OCI_USER}@${OCI_HOST}" bash -s -- "${OCI_DEPLOY_PATH}" "${GITHUB_SHA}" <<'EOF'
          set -euo pipefail

          DEPLOY_ROOT="$1"
          RELEASE_SHA="$2"
          RELEASE_DIR="${DEPLOY_ROOT}/releases/${RELEASE_SHA}"
          ARCHIVE_PATH="/tmp/release.tar.gz"
          ENV_PATH="/tmp/oracle.env"

          ensure_deploy_root() {
            if mkdir -p "${DEPLOY_ROOT}/releases" "${RELEASE_DIR}" 2>/dev/null; then
              return 0
            fi

            if command -v sudo >/dev/null 2>&1 && sudo -n true 2>/dev/null; then
              sudo mkdir -p "${DEPLOY_ROOT}/releases" "${RELEASE_DIR}"
              sudo chown -R "$(id -un)":"$(id -gn)" "${DEPLOY_ROOT}"
              return 0
            fi

            echo "Cannot create deploy directory: ${DEPLOY_ROOT}" >&2
            echo "Ensure OCI_DEPLOY_PATH is writable by $(id -un) or allow passwordless sudo." >&2
            return 1
          }

          ensure_deploy_root
          tar -xzf "${ARCHIVE_PATH}" -C "${RELEASE_DIR}"
          mv "${ENV_PATH}" "${RELEASE_DIR}/deploy/oracle/.env"

          cd "${RELEASE_DIR}/deploy/oracle"
          API_PORT_VALUE="$(awk -F= '$1 == "API_PORT" { print $2 }' .env | tail -n 1)"
          if [ -z "${API_PORT_VALUE}" ]; then
            API_PORT_VALUE="8081"
          fi

          if docker compose version >/dev/null 2>&1; then
            COMPOSE_CMD=(docker compose -p battle-hamsters --env-file .env)
          elif command -v docker-compose >/dev/null 2>&1; then
            COMPOSE_CMD=(docker-compose -p battle-hamsters --env-file .env)
          else
            echo "Neither 'docker compose' nor 'docker-compose' is available on the target host." >&2
            exit 1
          fi

          "${COMPOSE_CMD[@]}" up -d --build

          if ! python3 - "${API_PORT_VALUE}" <<'PY'
          import json
          import sys
          import time
          from urllib.error import URLError
          from urllib.request import urlopen

          port = sys.argv[1]
          url = f"http://127.0.0.1:{port}/health"
          deadline = time.time() + 30

          while time.time() < deadline:
              try:
                  with urlopen(url, timeout=3) as response:
                      if response.status != 200:
                          raise RuntimeError(f"Unexpected status: {response.status}")
                      payload = json.loads(response.read().decode("utf-8"))
                      if payload.get("status") != "ok":
                          raise RuntimeError(f"Unexpected payload: {payload}")
                      sys.exit(0)
              except (OSError, URLError, RuntimeError, ValueError):
                  time.sleep(3)

          sys.exit(1)
          PY
          then
            "${COMPOSE_CMD[@]}" ps || true
            "${COMPOSE_CMD[@]}" logs db --tail=200 || true
            "${COMPOSE_CMD[@]}" logs api --tail=200 || true
            exit 1
          fi

          ln -sfn "${RELEASE_DIR}" "${DEPLOY_ROOT}/current"

          rm -f "${ARCHIVE_PATH}"
          docker image prune -f >/dev/null 2>&1 || true
          EOF
