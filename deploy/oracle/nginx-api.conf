# /etc/nginx/sites-available/api-battlehamster
# 설치 후: sudo ln -sf /path/to/this/file /etc/nginx/sites-enabled/api-battlehamster

server {
    listen 80;
    server_name api-battlehamster.cuteshrew.com;

    # Let's Encrypt ACME 챌린지
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지는 HTTPS 로 리다이렉트
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api-battlehamster.cuteshrew.com;

    ssl_certificate     /etc/letsencrypt/live/api-battlehamster.cuteshrew.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-battlehamster.cuteshrew.com/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # 일반 HTTP API 프록시
    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # WebSocket 프록시 (/ws 경로)
    location /ws {
        proxy_pass         http://127.0.0.1:8082/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }
}
