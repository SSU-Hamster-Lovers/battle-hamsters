# /etc/nginx/sites-available/api-battlehamster
#
# 설치:
#   curl -fsSL https://raw.githubusercontent.com/SSU-Hamster-Lovers/battle-hamsters/main/deploy/oracle/nginx-api.conf \
#     -o /tmp/nginx-api.conf
#   sudo cp /tmp/nginx-api.conf /etc/nginx/sites-available/api-battlehamster
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name api-battlehamster.cuteshrew.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name api-battlehamster.cuteshrew.com;

    ssl_certificate     /etc/letsencrypt/live/api-battlehamster.cuteshrew.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api-battlehamster.cuteshrew.com/privkey.pem;

    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket 업그레이드 전용 (먼저 매칭돼야 함)
    location /ws {
        proxy_pass         http://127.0.0.1:8082/ws;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # 일반 HTTP API
    location / {
        proxy_pass         http://127.0.0.1:8082;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
